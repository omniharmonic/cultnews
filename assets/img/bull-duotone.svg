<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="A bronze bull, framed as an idol under a red halo." preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="halftone" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <rect width="6" height="6" fill="#171511"/>
      <circle cx="3" cy="3" r="1.5" fill="#F3EFE6"/>
    </pattern>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E7E0D0"/>
      <stop offset="1" stop-color="#F3EFE6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#sky)"/>
  <!-- ground / pedestal -->
  <rect x="0" y="520" width="1200" height="155" fill="url(#halftone)" opacity="0.9"/>
  <rect x="360" y="470" width="480" height="60" fill="#171511"/>
  <rect x="360" y="470" width="480" height="60" fill="url(#halftone)" opacity="0.35"/>

  <!-- red halo of the first god -->
  <circle cx="600" cy="250" r="185" fill="none" stroke="#A5241C" stroke-width="10" opacity="0.92"/>
  <circle cx="600" cy="250" r="205" fill="none" stroke="#A5241C" stroke-width="2" opacity="0.5"/>

  <!-- the bull, charging left — bold silhouette -->
  <g fill="#171511">
    <!-- body -->
    <path d="M470 300
             C430 300 400 330 395 360
             L385 430 C384 455 405 470 430 470
             L470 470 L470 440 L520 440 L520 470
             L700 470 L700 440 L750 440 L750 470
             L800 470 C825 470 840 452 835 428
             L820 350 C812 315 782 296 745 300
             C700 285 640 280 590 285
             C550 289 505 292 470 300 Z"/>
    <!-- head + neck lowered -->
    <path d="M395 360
             C360 358 330 372 312 398
             C300 416 302 442 322 452
             L360 466 C378 472 396 462 400 444
             L410 402 Z"/>
    <!-- horns -->
    <path d="M330 360 C300 330 296 300 316 286 C322 306 342 330 366 344 Z"/>
    <path d="M366 348 C348 316 356 288 380 282 C378 306 388 332 404 352 Z"/>
    <!-- tail -->
    <path d="M835 360 C868 350 886 372 878 400 C872 384 856 378 840 388 Z"/>
    <!-- legs -->
    <rect x="470" y="470" width="26" height="120"/>
    <rect x="560" y="470" width="26" height="120"/>
    <rect x="690" y="470" width="26" height="120"/>
    <rect x="778" y="470" width="26" height="120"/>
  </g>

  <!-- red eye -->
  <circle cx="352" cy="404" r="9" fill="#A5241C"/>
  <!-- red nostril snort -->
  <path d="M312 430 q-22 6 -34 -4" fill="none" stroke="#A5241C" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <path d="M312 442 q-26 10 -42 0" fill="none" stroke="#A5241C" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
</svg>
