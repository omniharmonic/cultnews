<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Cult News">
  <rect width="64" height="64" fill="#F3EFE6"/>
  <!-- halo of the first god -->
  <circle cx="32" cy="26" r="15" fill="none" stroke="#A5241C" stroke-width="2.5"/>
  <!-- calf head: bold woodcut silhouette -->
  <g fill="#171511">
    <!-- horns -->
    <path d="M15 20 C12 12 18 9 22 13 C19 15 19 19 21 22 Z"/>
    <path d="M49 20 C52 12 46 9 42 13 C45 15 45 19 43 22 Z"/>
    <!-- head -->
    <path d="M22 18 C22 14 26 12 32 12 C38 12 42 14 42 18 L43 30 C43 38 38 43 32 43 C26 43 21 38 21 30 Z"/>
  </g>
  <!-- muzzle + eyes knocked out in newsprint -->
  <ellipse cx="32" cy="35" rx="6.5" ry="4.5" fill="#F3EFE6"/>
  <circle cx="27" cy="35" r="1.1" fill="#171511"/>
  <circle cx="37" cy="35" r="1.1" fill="#171511"/>
  <circle cx="26.5" cy="24" r="2.1" fill="#F3EFE6"/>
  <circle cx="37.5" cy="24" r="2.1" fill="#F3EFE6"/>
  <!-- press-red ledger rule -->
  <rect x="10" y="50" width="44" height="3" fill="#A5241C"/>
</svg>
